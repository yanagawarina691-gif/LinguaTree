<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>LinguaTree — 英语知识树</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ====== RESET & BASE ====== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Nunito','Noto Sans SC',sans-serif;background:#1a1a2e;color:#4B4B4B;overflow:hidden;height:100vh;display:flex;justify-content:center;align-items:center}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none}
input{font-family:inherit;border:none;outline:none;background:none}
:root{
--primary:#58CC02;--primary-dk:#46A302;
--blue:#1CB0F6;--blue-dk:#1899D6;
--purple:#CE82FF;--purple-dk:#A856E0;
--orange:#FF9600;--orange-dk:#E08600;
--red:#FF4B4B;--red-dk:#EA3838;
--yellow:#FFC800;--yellow-dk:#E0B400;
--bg:#FFFFFF;--bg-gray:#F7F7F7;
--text:#4B4B4B;--text-lt:#AFAFAF;
--border:#E5E5E5;--shadow:0 2px 12px rgba(0,0,0,.08);
}

/* ====== PHONE FRAME ====== */
#phone{
width:390px;height:844px;background:var(--bg);border-radius:40px;overflow:hidden;
position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 0 12px #2a2a4a,0 0 0 14px #3a3a5a;
}
@media(max-height:880px){#phone{height:100vh;border-radius:0;box-shadow:none;border:none}}
@media(max-width:430px){#phone{width:100vw;height:100vh;border-radius:0;box-shadow:none;border:none}}

/* ====== APP CONTAINER ====== */
#app{width:100%;height:100%;position:relative;overflow:hidden}
.page{position:absolute;inset:0;display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.page.active{display:block}

/* ====== TOP BAR ====== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;background:var(--bg);position:sticky;top:0;z-index:10}
.topbar-logo{font-family:'Fredoka','ZCOOL KuaiLe',sans-serif;font-weight:700;font-size:22px;color:var(--primary);display:flex;align-items:center;gap:6px}
.topbar-logo .leaf{width:28px;height:28px}
.topbar-actions{display:flex;align-items:center;gap:10px}
.topbar-btn{width:40px;height:40px;border-radius:12px;background:var(--bg-gray);display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform .15s}
.topbar-btn:active{transform:scale(.92)}
.topbar-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}

/* ====== TAB BAR ====== */
#tabbar{position:absolute;bottom:0;left:0;right:0;height:72px;background:#fff;border-top:2px solid var(--border);display:flex;justify-content:space-around;align-items:flex-start;padding-top:8px;z-index:100;transition:transform .3s}
#tabbar.hidden{transform:translateY(100%)}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;cursor:pointer;transition:transform .15s}
.tab-item:active{transform:scale(.9)}
.tab-icon{font-size:22px;line-height:1}
.tab-label{font-size:10px;font-weight:700;color:var(--text-lt);letter-spacing:.3px}
.tab-item.active .tab-label{color:var(--primary)}
.tab-badge{font-size:8px;font-weight:800;color:#fff;background:var(--orange);padding:1px 5px;border-radius:8px;position:absolute;transform:translate(18px,-4px)}

/* ====== 3D BUTTON ====== */
.btn3d{position:relative;border-radius:16px;font-weight:800;letter-spacing:.3px;transition:transform .1s,box-shadow .1s;font-family:'Nunito','Noto Sans SC',sans-serif;text-align:center;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn3d:active{transform:translateY(4px)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 5px 0 var(--primary-dk)}
.btn-primary:active{box-shadow:0 1px 0 var(--primary-dk)}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 5px 0 var(--blue-dk)}
.btn-blue:active{box-shadow:0 1px 0 var(--blue-dk)}
.btn-gray{background:var(--bg-gray);color:var(--text);box-shadow:0 5px 0 var(--border)}
.btn-gray:active{box-shadow:0 1px 0 var(--border)}
.btn-white{background:#fff;color:var(--primary);border:2px solid var(--border);box-shadow:0 5px 0 var(--border)}
.btn-white:active{box-shadow:0 1px 0 var(--border)}

/* ====== FEED PAGE ====== */
.feed-hero{padding:8px 20px 16px;text-align:center}
.feed-hero h1{font-family:'Fredoka','ZCOOL KuaiLe',sans-serif;font-size:26px;font-weight:700;color:var(--text);margin-bottom:4px}
.feed-hero p{font-size:14px;color:var(--text-lt);font-weight:600}
.feed-hero .tree-mascot{width:80px;height:80px;margin:0 auto 8px}

.link-input-wrap{padding:0 20px;margin-bottom:16px}
.link-input-card{background:var(--bg-gray);border-radius:20px;padding:16px;border:2px solid var(--border);transition:border-color .2s}
.link-input-card:focus-within{border-color:var(--primary)}
.link-input-row{display:flex;align-items:center;gap:10px}
.link-input-row input{flex:1;font-size:15px;font-weight:600;color:var(--text);background:transparent}
.link-input-row input::placeholder{color:var(--text-lt);font-weight:400}
.link-input-row .paste-btn{width:36px;height:36px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.link-input-row .paste-btn:active{transform:scale(.9)}
.link-input-card .btn3d{width:100%;margin-top:12px;padding:14px;font-size:16px}

.parse-status{padding:0 20px;margin-bottom:16px}
.parse-card{background:#fff;border-radius:20px;padding:20px;box-shadow:var(--shadow)}
.parse-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.parse-steps{display:flex;flex-direction:column;gap:12px}
.parse-step{display:flex;align-items:center;gap:12px;opacity:.4;transition:opacity .4s}
.parse-step.active{opacity:1}
.parse-step.done{opacity:.7}
.parse-step-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--bg-gray)}
.parse-step.active .parse-step-icon{background:var(--blue);color:#fff;animation:pulse 1.2s infinite}
.parse-step.done .parse-step-icon{background:var(--primary);color:#fff}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.parse-step-text{flex:1}
.parse-step-name{font-size:14px;font-weight:700;color:var(--text)}
.parse-step-desc{font-size:12px;color:var(--text-lt)}
.parse-spinner{width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.parse-step.done .parse-spinner{display:none}
.parse-step.active .parse-spinner{display:block}
.parse-step:not(.active):not(.done) .parse-spinner{display:none}

.video-section{padding:0 20px 100px}
.section-title{font-size:14px;font-weight:800;color:var(--text-lt);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.section-title .count{font-size:12px;color:var(--text-lt);text-transform:none;letter-spacing:0}
.video-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px;cursor:pointer;transition:transform .15s}
.video-card:active{transform:scale(.97)}
.video-thumb{width:100%;height:120px;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;position:relative}
.video-thumb .play-icon{font-size:36px;color:rgba(255,255,255,.8)}
.video-thumb .duration{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px}
.video-info{padding:12px}
.video-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.3}
.video-tags{display:flex;flex-wrap:wrap;gap:4px}
.video-tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;color:#fff}
.tag-grammar{background:var(--purple)}
.tag-vocab{background:var(--orange)}
.tag-pron{background:var(--red)}
.tag-listen{background:var(--blue)}
.tag-culture{background:var(--yellow);color:var(--text)}
.video-xp{font-size:11px;font-weight:800;color:var(--primary);margin-top:4px}

/* ====== TRAINING PAGE ====== */
.training-page{background:var(--bg-gray)}
.training-header{text-align:center;padding:24px 20px 8px}
.training-progress{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.progress-dot{width:32px;height:6px;border-radius:3px;background:var(--border);transition:background .3s}
.progress-dot.active{background:var(--primary)}
.progress-dot.done{background:var(--primary)}
.training-q-type{font-size:12px;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:1px}
.training-question{background:#fff;border-radius:20px;padding:24px 20px;margin:0 20px 12px;box-shadow:var(--shadow)}
.training-q-text{font-size:18px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:20px}
.training-options{display:flex;flex-direction:column;gap:10px}
.training-option{border:2px solid var(--border);border-radius:14px;padding:14px 16px;font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:12px;transition:all .2s;cursor:pointer;background:#fff}
.training-option:active{transform:scale(.97)}
.training-option .opt-letter{width:28px;height:28px;border-radius:8px;background:var(--bg-gray);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.training-option.correct{border-color:var(--primary);background:rgba(88,204,2,.08)}
.training-option.correct .opt-letter{background:var(--primary);color:#fff}
.training-option.wrong{border-color:var(--red);background:rgba(255,75,75,.08)}
.training-option.wrong .opt-letter{background:var(--red);color:#fff}
.training-option.disabled{opacity:.5}
.training-explanation{background:rgba(28,176,246,.08);border-radius:14px;padding:14px;margin-top:12px;font-size:13px;color:var(--text);line-height:1.5;display:none}
.training-explanation.show{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.training-fill-input{border:2px solid var(--border);border-radius:14px;padding:14px;font-size:16px;font-weight:600;color:var(--text);text-align:center;margin-bottom:12px;transition:border-color .2s}
.training-fill-input:focus{border-color:var(--primary)}
.training-truefalse{display:flex;gap:12px}
.training-truefalse .training-option{flex:1;justify-content:center}
.training-next-btn{margin:0 20px 100px}
.training-skip{position:absolute;top:20px;right:20px;font-size:13px;font-weight:700;color:var(--text-lt);cursor:pointer}
.training-result{text-align:center;padding:40px 20px}
.training-result .big-check{font-size:64px;margin-bottom:12px;animation:bounceIn .5s}
@keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.training-result-score{font-size:32px;font-weight:900;color:var(--primary);font-family:'Fredoka',sans-serif;margin-bottom:4px}
.training-result-label{font-size:14px;color:var(--text-lt);font-weight:600;margin-bottom:24px}

/* ====== HARVEST CARD OVERLAY ====== */
#harvest-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;justify-content:center;align-items:flex-end;padding-bottom:0}
#harvest-overlay.show{display:flex;animation:fadeIn .3s}
.harvest-card{background:#fff;border-radius:24px 24px 0 0;width:100%;padding:32px 24px 40px;text-align:center;animation:slideUp .4s cubic-bezier(.34,1.56,.64,1);position:relative}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.harvest-mascot{width:100px;height:100px;margin:0 auto 12px;animation:mascotBounce .6s ease-out}
@keyframes mascotBounce{0%{transform:scale(0) rotate(-10deg)}60%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.harvest-title{font-family:'Fredoka','ZCOOL KuaiLe',sans-serif;font-size:24px;font-weight:700;color:var(--text);margin-bottom:4px}
.harvest-subtitle{font-size:14px;color:var(--text-lt);font-weight:600;margin-bottom:20px}
.harvest-xp-display{display:flex;justify-content:center;gap:16px;margin-bottom:24px}
.harvest-xp-item{background:var(--bg-gray);border-radius:16px;padding:12px 20px;min-width:100px}
.harvest-xp-num{font-size:28px;font-weight:900;font-family:'Fredoka',sans-serif}
.harvest-xp-label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px}
.harvest-branches{display:flex;justify-content:center;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.harvest-branch-tag{padding:6px 14px;border-radius:12px;font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;gap:4px}
.harvest-btn-row{display:flex;gap:12px}
.harvest-btn-row .btn3d{flex:1;padding:16px;font-size:15px}
.harvest-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:var(--bg-gray);display:flex;align-items:center;justify-content:center;color:var(--text-lt);font-size:18px;cursor:pointer}

/* Confetti */
.confetti-piece{position:absolute;width:10px;height:10px;top:-10px;border-radius:2px;animation:confettiFall 1.2s ease-out forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(500px) rotate(720deg);opacity:0}}

/* ====== KNOWLEDGE TREE PAGE ====== */
.tree-page{background:linear-gradient(180deg,#e8f5e9 0%,#fff 30%,#fff 100%)}
.tree-canvas{width:100%;height:calc(100% - 72px);position:relative;overflow:hidden}
.tree-svg{width:100%;height:100%;cursor:grab}
.tree-svg:active{cursor:grabbing}
.tree-node-circle{cursor:pointer;transition:transform .2s}
.tree-node-circle:hover{transform:scale(1.15)}
.tree-legend{position:absolute;bottom:16px;left:16px;right:16px;background:#fff;border-radius:16px;padding:12px 16px;box-shadow:var(--shadow);display:flex;justify-content:space-around}
.tree-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text-lt)}
.tree-legend-dot{width:12px;height:12px;border-radius:50%}
.tree-stats{position:absolute;top:16px;left:16px;right:16px;display:flex;justify-content:space-between}
.tree-stat-pill{background:#fff;border-radius:12px;padding:8px 14px;box-shadow:var(--shadow);font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
.tree-zoom-controls{position:absolute;right:16px;bottom:80px;display:flex;flex-direction:column;gap:8px}
.tree-zoom-btn{width:40px;height:40px;border-radius:12px;background:#fff;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--text);cursor:pointer}
.tree-zoom-btn:active{transform:scale(.9)}

/* Tree node states */
.node-lv0{fill:#E0E0E0;stroke:#ccc;stroke-width:1.5}
.node-lv1{fill:#A8E6A1;stroke:#58CC02;stroke-width:1.5}
.node-lv2{fill:#58CC02;stroke:#46A302;stroke-width:2}
.node-lv3{fill:#FFD700;stroke:#E0B400;stroke-width:2.5;filter:drop-shadow(0 0 6px rgba(255,215,0,.6))}
.branch-path{fill:none;stroke-linecap:round;opacity:.6}
.sub-branch-path{fill:none;stroke-linecap:round;opacity:.4}
.tree-node-label{font-size:9px;font-weight:700;fill:#4B4B4B;pointer-events:none;text-anchor:middle;opacity:0;transition:opacity .3s}
.tree-node-label.visible{opacity:.8}
.tree-branch-label{font-size:11px;font-weight:800;pointer-events:none;text-anchor:middle}

/* AI Art Assets */
.tree-bg-img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;pointer-events:none;user-select:none}
.tree-hotspots{position:absolute;top:0;left:0;right:0;bottom:0;z-index:5}
.tree-hotspot{position:absolute;border-radius:50%;cursor:pointer;transition:transform .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center;font-size:20px}
.tree-hotspot:hover{transform:scale(1.1);box-shadow:0 0 0 3px rgba(255,255,255,.4)}
.tree-hotspot:active{transform:scale(.9)}
.tree-hotspot .hs-glow{position:absolute;inset:-8px;border-radius:50%;opacity:0;transition:opacity .3s}
.tree-hotspot:hover .hs-glow{opacity:1}
.badge-sprite{width:48px;height:48px;background-size:300% 200%;border-radius:50%;margin:0 auto 4px;background-repeat:no-repeat}
.growth-legend-img{width:100%;max-height:28px;object-fit:contain}
.mascot-img{object-fit:contain}

/* ====== BRANCH DETAIL PAGE ====== */
.branch-detail-page{background:var(--bg-gray)}
.branch-header{padding:20px 20px 24px;color:#fff;position:relative;overflow:hidden}
.branch-header::after{content:'';position:absolute;bottom:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.1)}
.branch-header .bh-icon{font-size:32px;margin-bottom:4px}
.branch-header h2{font-family:'Fredoka','ZCOOL KuaiLe',sans-serif;font-size:24px;font-weight:700}
.branch-header .bh-en{font-size:12px;opacity:.8;font-weight:600}
.branch-stats{display:flex;gap:12px;margin-top:12px}
.branch-stat{background:rgba(255,255,255,.2);border-radius:10px;padding:8px 14px}
.branch-stat-num{font-size:18px;font-weight:900;font-family:'Fredoka',sans-serif}
.branch-stat-label{font-size:10px;opacity:.9;font-weight:600}
.node-list{padding:16px 20px}
.node-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.node-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.node-name{font-size:15px;font-weight:700;color:var(--text)}
.node-level-badge{font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px;color:#fff}
.lvl-0{background:#ccc}
.lvl-1{background:#A8E6A1;color:#46A302}
.lvl-2{background:var(--primary)}
.lvl-3{background:var(--yellow);color:var(--text)}
.node-mastery-bar{height:8px;background:var(--bg-gray);border-radius:4px;overflow:hidden}
.node-mastery-fill{height:100%;border-radius:4px;transition:width .5s}
.node-xp-text{font-size:11px;font-weight:600;color:var(--text-lt);margin-top:4px}
.recommend-section{padding:16px 20px 100px}
.recommend-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:center}
.recommend-thumb{width:64px;height:64px;border-radius:10px;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.recommend-info{flex:1}
.recommend-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
.recommend-meta{font-size:11px;color:var(--text-lt);margin-top:4px}

/* ====== PERSONAL PAGE ====== */
.me-page{background:var(--bg-gray)}
.me-header{background:linear-gradient(135deg,var(--primary),#3a8a01);padding:24px 20px 32px;color:#fff;text-align:center;position:relative;border-radius:0 0 24px 24px}
.me-avatar{width:72px;height:72px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 8px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.me-name{font-size:20px;font-weight:800;font-family:'Fredoka','ZCOOL KuaiLe',sans-serif}
.me-level{font-size:13px;font-weight:600;opacity:.9;margin-top:2px}
.me-xp-bar{margin-top:12px;background:rgba(255,255,255,.25);height:8px;border-radius:4px;overflow:hidden}
.me-xp-fill{height:100%;background:#fff;border-radius:4px}
.me-xp-text{font-size:11px;font-weight:600;opacity:.8;margin-top:4px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;padding:0 20px;gap:12px;margin-top:-16px}
.stat-card{background:#fff;border-radius:16px;padding:16px;text-align:center;box-shadow:var(--shadow)}
.stat-num{font-size:28px;font-weight:900;font-family:'Fredoka',sans-serif;color:var(--text)}
.stat-label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.stat-icon{font-size:20px;margin-bottom:4px}
.weekly-chart{padding:20px}
.chart-bars{display:flex;justify-content:space-between;align-items:flex-end;height:100px;gap:6px}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bar{width:100%;border-radius:6px 6px 0 0;background:var(--primary);min-height:4px;transition:height .5s}
.chart-bar.rest{background:var(--bg-gray)}
.chart-day{font-size:10px;font-weight:700;color:var(--text-lt)}
.achievements{padding:0 20px 100px}

<script>
// ====== API CLIENT ======
const API_BASE = '';
const TOKEN_KEY = 'linguatree_token';
const USER_KEY = 'linguatree_user';

function getToken() { return localStorage.getItem(TOKEN_KEY); }
function getUser() { try { return JSON.parse(localStorage.getItem(USER_KEY)); } catch { return null; } }
function setAuth(token, user) { localStorage.setItem(TOKEN_KEY, token); localStorage.setItem(USER_KEY, JSON.stringify(user)); }
function clearAuth() { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(USER_KEY); }

async function api(path, options = {}) {
  const token = getToken();
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API_BASE + path, { ...options, headers });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `请求失败: ${res.status}`);
  return data;
}

// ====== BRANCH VISUAL CONFIG (static) ======
const BRANCH_VISUAL = {
  listening:    { en:'Listening',     colorDk:'#1899D6', icon:'👂', angle:195, spread:18 },
  grammar:      { en:'Grammar',       colorDk:'#A856E0', icon:'✏️', angle:235, spread:68 },
  culture:      { en:'Culture',       colorDk:'#E0B400', icon:'🌍', angle:275, spread:16 },
  vocabulary:   { en:'Vocabulary',    colorDk:'#E08600', icon:'📖', angle:310, spread:42 },
  pronunciation:{ en:'Pronunciation', colorDk:'#EA3838', icon:'🗣️', angle:345, spread:28 },
  other:        { en:'Other',         colorDk:'#888888', icon:'📦', angle:30, spread:10 },
};

// Hotspot positions for tree visualization
const BRANCH_HOTSPOTS = {
  listening:     { x: 20, y: 52 },
  grammar:       { x: 26, y: 22 },
  culture:       { x: 50, y: 15 },
  vocabulary:    { x: 74, y: 22 },
  pronunciation: { x: 80, y: 48 },
  other:         { x: 50, y: 80 },
};

// ====== STATE ======
let state = {
  route: 'feed',
  parseStep: -1,
  trainingStep: 0,
  trainingCorrect: 0,
  currentBranch: null,
  treeZoom: 1,
  treePanX: 0,
  treePanY: 0,
  currentVideoId: null,
  currentExercises: [],
  treeData: null,
  treeStats: null,
  userStats: null,
  pollingTimer: null,
};

// ====== MASCOT ======
function mascotSVG(size=80) {
  return `<img src="assets/mascot-tree.png" width="${size}" height="${size}" style="object-fit:contain" class="mascot-img" alt="LinguaTree mascot">`;
}

// ====== AUTH ======
async function doLogin() {
  const nickname = document.getElementById('login-nickname').value.trim();
  if (!nickname) { showToast('请输入昵称'); return; }
  try {
    const data = await api('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ nickname }),
    });
    setAuth(data.token, { id: data.userId, nickname: data.nickname });
    document.getElementById('login-overlay').classList.add('hide');
    initApp();
  } catch (e) {
    showToast('登录失败: ' + e.message);
  }
}

function checkAuth() {
  const token = getToken();
  const user = getUser();
  if (token && user) {
    document.getElementById('login-overlay').classList.add('hide');
    return true;
  }
  document.getElementById('login-overlay').classList.remove('hide');
  return false;
}

// ====== INIT ======
async function initApp() {
  const user = getUser();
  if (user) {
    document.querySelector('.me-name').textContent = user.nickname;
    document.querySelector('.topbar-avatar').textContent = user.nickname.charAt(0);
  }
  renderFeed();
}

// ====== ROUTER ======
function navigate(route) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById('page-' + route);
  if (page) page.classList.add('active');
  state.route = route;

  const tabbar = document.getElementById('tabbar');
  if (['feed','tree','me'].includes(route)) {
    tabbar.classList.remove('hidden');
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    const activeTab = document.querySelector(`.tab-item[data-route="${route}"]`);
    if (activeTab) activeTab.classList.add('active');
  } else {
    tabbar.classList.add('hidden');
  }

  if (route === 'tree') renderTree();
  if (route === 'me') renderMe();
  if (route === 'feed') renderFeed();
}

// ====== FEED PAGE ======
async function renderFeed() {
  document.getElementById('feed-mascot').innerHTML = mascotSVG(80);
  await loadVideoList();
}

async function loadVideoList() {
  const container = document.getElementById('video-list');
  const countEl = document.querySelector('.video-section .count');
  try {
    container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-lt)">加载中...</div>';
    const videos = await api('/api/videos');
    if (countEl) countEl.textContent = `${videos.length} 条`;
    if (!videos || videos.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-lt)">还没有解析过视频<br>粘贴链接开始吧！</div>';
      return;
    }
    // Map API video list to display format
    const colorMap = { grammar:'#CE82FF', vocabulary:'#FF9600', pronunciation:'#FF4B4B', listening:'#1CB0F6', culture:'#FFC800', other:'#999999' };
    const html = videos.map(v => {
      const statusBadge = v.status === 'done' ? `<div class="video-xp">✅ 已完成</div>` :
                          v.status === 'error' ? `<div class="video-xp" style="color:var(--red)">❌ 解析失败</div>` :
                          `<div class="video-xp">⏳ 解析中...</div>`;
      const title = v.title || v.source_url || '未知视频';
      const summary = v.summary ? v.summary.substring(0, 60) + '...' : '';
      const cefr = v.cefr_level ? `<span class="video-tag" style="background:${colorMap[v.cefr_level==='B2'?'grammar':'vocabulary']}20;color:${colorMap[v.cefr_level==='B2'?'grammar':'vocabulary']}">${v.cefr_level}</span>` : '';
      return `
        <div class="video-card" onclick="${v.status==='done' ? `startTrainingForVideo('${v.id}')` : `checkVideoStatus('${v.id}')`}">
          <div class="video-thumb"><span class="play-icon">▶</span></div>
          <div class="video-info">
            <div class="video-title">${title}</div>
            ${summary ? `<div style="font-size:12px;color:var(--text-lt);margin-top:2px">${summary}</div>` : ''}
            <div class="video-tags">${cefr}</div>
            ${statusBadge}
          </div>
        </div>
      `;
    }).join('');
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = `<div style="text-align:center;padding:20px;color:var(--red)">加载失败: ${e.message}</div>`;
  }
}

async function pasteFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('link-input').value = text.trim();
    showToast('已粘贴链接');
  } catch {
    showToast('请手动粘贴链接');
  }
}

// ====== VIDEO PARSE (real API) ======
async function startParse() {
  const link = document.getElementById('link-input').value.trim();
  if (!link) { showToast('请先粘贴视频链接'); return; }

  const wrap = document.getElementById('parse-status-wrap');
  wrap.style.display = 'block';

  const steps = [
    { icon:'🎬', name:'获取视频信息', desc:'下载视频、提取音频和关键帧', stage:'download' },
    { icon:'🎤', name:'ASR 语音转写', desc:'识别视频中的语音内容', stage:'asr' },
    { icon:'📝', name:'OCR 文字识别', desc:'识别画面中的板书和字幕', stage:'ocr' },
    { icon:'👁️', name:'VLM 画面理解', desc:'分析画面场景和教学动作', stage:'vlm' },
    { icon:'🧠', name:'LLM 知识点抽取', desc:'映射到知识树节点 + 生成训练题', stage:'llm' },
  ];

  wrap.innerHTML = `
    <div class="parse-card">
      <div class="parse-title">🔍 AI 正在解析视频...</div>
      <div class="parse-steps" id="parse-steps">
        ${steps.map((s,i) => `
          <div class="parse-step" data-step="${i}" data-stage="${s.stage}">
            <div class="parse-step-icon">${s.icon}</div>
            <div class="parse-step-text">
              <div class="parse-step-name">${s.name}</div>
              <div class="parse-step-desc">${s.desc}</div>
            </div>
            <div class="parse-spinner"></div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  try {
    // Submit to API
    const result = await api('/api/videos/parse', {
      method: 'POST',
      body: JSON.stringify({ url: link }),
    });
    state.currentVideoId = result.videoId;

    // Poll status
    await pollParseStatus(result.videoId, steps);
  } catch (e) {
    wrap.innerHTML = `<div class="parse-card"><div class="parse-title" style="color:var(--red)">❌ 解析失败</div><div style="padding:8px 0;font-size:14px;color:var(--text-lt)">${e.message}</div></div>`;
    showToast('解析失败: ' + e.message);
  }
}

async function pollParseStatus(videoId, steps) {
  const stageMap = { download:0, asr:1, ocr:2, vlm:2, llm:3, tree_update:4 };

  const poll = async () => {
    try {
      const status = await api(`/api/videos/${videoId}/status`);

      // Update step indicators based on logs
      if (status.logs) {
        for (const log of status.logs) {
          const stepIdx = stageMap[log.stage];
          if (stepIdx === undefined) continue;
          const stepEl = document.querySelector(`.parse-step[data-step="${stepIdx}"]`);
          if (!stepEl) continue;
          if (log.status === 'success') {
            stepEl.classList.remove('active');
            stepEl.classList.add('done');
            const spinner = stepEl.querySelector('.parse-spinner');
            if (spinner) spinner.remove();
            const icon = stepEl.querySelector('.parse-step-icon');
            if (icon && !icon.dataset.done) {
              icon.dataset.done = '1';
              icon.style.cssText = 'background:var(--primary);color:#fff';
              icon.textContent = '✓';
            }
          } else if (log.status === 'running' || log.status === 'start') {
            stepEl.classList.add('active');
          }
        }
      }

      if (status.status === 'done') {
        // Mark all steps as done
        document.querySelectorAll('.parse-step').forEach(el => {
          el.classList.remove('active');
          el.classList.add('done');
          const spinner = el.querySelector('.parse-spinner');
          if (spinner) spinner.remove();
          const icon = el.querySelector('.parse-step-icon');
          if (icon && !icon.dataset.done) {
            icon.dataset.done = '1';
            icon.style.cssText = 'background:var(--primary);color:#fff';
            icon.textContent = '✓';
          }
        });

        await sleep(500);
        showToast('解析完成！开始巩固训练');
        document.getElementById('parse-status-wrap').style.display = 'none';
        await startTrainingForVideo(videoId);
        return;
      }

      if (status.status === 'error') {
        const wrap = document.getElementById('parse-status-wrap');
        wrap.innerHTML = `<div class="parse-card"><div class="parse-title" style="color:var(--red)">❌ 解析失败</div><div style="padding:8px 0;font-size:14px;color:var(--text-lt)">${status.error_message || '未知错误'}</div></div>`;
        showToast('解析失败');
        return;
      }

      // Continue polling
      state.pollingTimer = setTimeout(poll, 3000);
    } catch (e) {
      state.pollingTimer = setTimeout(poll, 5000);
    }
  };

  poll();
}

async function checkVideoStatus(videoId) {
  try {
    const status = await api(`/api/videos/${videoId}/status`);
    if (status.status === 'done') {
      startTrainingForVideo(videoId);
    } else if (status.status === 'error') {
      showToast('该视频解析失败: ' + (status.error_message || ''));
    } else {
      showToast('视频还在解析中: ' + status.status);
    }
  } catch (e) {
    showToast('查询失败: ' + e.message);
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ====== TRAINING (real exercises) ======
async function startTrainingForVideo(videoId) {
  try {
    const detail = await api(`/api/videos/${videoId}`);
    if (detail.status !== 'done') {
      showToast('视频尚未解析完成');
      return;
    }

    // Build exercise array from API response
    const exercises = [];
    if (detail.exercises) {
      if (detail.exercises.choice) {
        const ex = detail.exercises.choice;
        exercises.push({
          typeLabel: 'choice',
          type: '选择',
          question: ex.question,
          options: ex.options || [],
          answer: ex.answer,
          explanation: ex.explanation,
          id: ex.id,
          nodeId: ex.node_id,
        });
      }
      if (detail.exercises.fill) {
        const ex = detail.exercises.fill;
        exercises.push({
          typeLabel: 'fill',
          type: '填空',
          question: ex.question,
          answer: ex.answer,
          explanation: ex.explanation,
          id: ex.id,
          nodeId: ex.node_id,
        });
      }
      if (detail.exercises.judge) {
        const ex = detail.exercises.judge;
        exercises.push({
          typeLabel: 'truefalse',
          type: '判断',
          question: ex.question,
          answer: ex.answer,
          explanation: ex.explanation,
          id: ex.id,
          nodeId: ex.node_id,
        });
      }
    }

    if (exercises.length === 0) {
      showToast('该视频没有练习题');
      return;
    }

    state.currentVideoId = videoId;
    state.currentExercises = exercises;
    state.trainingStep = 0;
    state.trainingCorrect = 0;
    state.trainingAttempts = [];
    navigate('training');
    renderQuestion();
  } catch (e) {
    showToast('加载练习题失败: ' + e.message);
  }
}

function renderQuestion() {
  const q = state.currentExercises[state.trainingStep];
  const total = state.currentExercises.length;
  const content = document.getElementById('training-content');

  let html = `
    <div class="training-header">
      <div class="training-progress">
        ${Array.from({length:total}, (_,i) => `<div class="progress-dot ${i===state.trainingStep?'active':''} ${i<state.trainingStep?'done':''}"></div>`).join('')}
      </div>
      <div class="training-q-type">${q.type}题 · ${state.trainingStep+1}/${total}</div>
    </div>
  `;

  if (q.typeLabel === 'choice') {
    html += `
      <div class="training-question">
        <div class="training-q-text">${q.question}</div>
        <div class="training-options" id="opts">
          ${q.options.map((opt,i) => `
            <div class="training-option" data-idx="${i}" onclick="answerChoice(${i})">
              <div class="opt-letter">${'ABCD'[i]}</div>
              <div>${opt}</div>
            </div>
          `).join('')}
        </div>
        <div class="training-explanation" id="exp"></div>
      </div>
    `;
  } else if (q.typeLabel === 'fill') {
    html += `
      <div class="training-question">
        <div class="training-q-text">${q.question}</div>
        <input class="training-fill-input" id="fill-input" placeholder="输入你的答案..." onkeydown="if(event.key==='Enter')checkFill()">
        <button class="btn3d btn-primary training-next-btn" style="width:calc(100% - 40px);margin:0 20px 100px;padding:14px" onclick="checkFill()">提交</button>
        <div class="training-explanation" id="exp" style="margin:0 20px"></div>
      </div>
    `;
  } else if (q.typeLabel === 'truefalse') {
    html += `
      <div class="training-question">
        <div class="training-q-text">${q.question}</div>
        <div class="training-options">
          <div class="training-option" onclick="answerTF(true)"><div class="opt-letter">✓</div><div>正确</div></div>
          <div class="training-option" onclick="answerTF(false)"><div class="opt-letter">✗</div><div>错误</div></div>
        </div>
        <div class="training-explanation" id="exp"></div>
      </div>
    `;
  }

  content.innerHTML = html;
}

function answerChoice(idx) {
  const q = state.currentExercises[state.trainingStep];
  const opts = document.querySelectorAll('.training-option');
  opts.forEach(o => o.classList.add('disabled'));
  opts[idx].classList.add(idx === q.answer ? 'correct' : 'wrong');
  if (idx !== q.answer) opts[q.answer].classList.add('correct');
  if (idx === q.answer) state.trainingCorrect++;

  state.trainingAttempts.push({ exerciseId: q.id, nodeId: q.nodeId, isCorrect: idx === q.answer, isSkipped: false, userAnswer: idx });

  const exp = document.getElementById('exp');
  exp.innerHTML = `<strong>${idx === q.answer ? '✅ 正确！' : '❌ 答错了'}</strong><br>${q.explanation}`;
  exp.classList.add('show');
  setTimeout(() => nextQuestion(), 2800);
}

function checkFill() {
  const q = state.currentExercises[state.trainingStep];
  const input = document.getElementById('fill-input');
  const val = input.value.trim().toLowerCase();
  const correct = val === q.answer.toLowerCase();
  input.style.borderColor = correct ? 'var(--primary)' : 'var(--red)';
  if (correct) state.trainingCorrect++;

  state.trainingAttempts.push({ exerciseId: q.id, nodeId: q.nodeId, isCorrect: correct, isSkipped: false, userAnswer: val });

  const exp = document.getElementById('exp');
  exp.innerHTML = `<strong>${correct ? '✅ 正确！' : '❌ 答错了'}</strong><br>正确答案：<strong>${q.answer}</strong><br>${q.explanation}`;
  exp.classList.add('show');
  setTimeout(() => nextQuestion(), 3000);
}

function answerTF(val) {
  const q = state.currentExercises[state.trainingStep];
  const opts = document.querySelectorAll('.training-option');
  opts.forEach(o => o.classList.add('disabled'));
  const clicked = val ? opts[0] : opts[1];
  const correct = val === q.answer;
  clicked.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) (q.answer ? opts[0] : opts[1]).classList.add('correct');
  if (correct) state.trainingCorrect++;

  state.trainingAttempts.push({ exerciseId: q.id, nodeId: q.nodeId, isCorrect: correct, isSkipped: false, userAnswer: val });

  const exp = document.getElementById('exp');
  exp.innerHTML = `<strong>${correct ? '✅ 正确！' : '❌ 答错了'}</strong><br>${q.explanation}`;
  exp.classList.add('show');
  setTimeout(() => nextQuestion(), 2800);
}

function skipQuestion() {
  const q = state.currentExercises[state.trainingStep];
  state.trainingAttempts.push({ exerciseId: q.id, nodeId: q.nodeId, isCorrect: false, isSkipped: true, userAnswer: null });
  nextQuestion();
}

function nextQuestion() {
  if (state.trainingStep < state.currentExercises.length - 1) {
    state.trainingStep++;
    renderQuestion();
  } else {
    showTrainingResult();
  }
}

async function showTrainingResult() {
  const correct = state.trainingCorrect;
  const total = state.currentExercises.length;

  // Submit results to API
  try {
    const result = await api(`/api/videos/${state.currentVideoId}/exercises/complete`, {
      method: 'POST',
      body: JSON.stringify({ attempts: state.trainingAttempts }),
    });
    // Use server-returned XP if available
    const xp = (result.treeUpdate && result.treeUpdate.totalXpGain) ? result.treeUpdate.totalXpGain : (correct * 20 + 40);
    showHarvest(xp, correct, result.treeUpdate);
  } catch (e) {
    const xp = correct * 20 + 40;
    showHarvest(xp, correct, null);
  }
}

// ====== HARVEST CARD ======
function showHarvest(xp, correct, treeUpdate) {
  const overlay = document.getElementById('harvest-overlay');
  document.getElementById('harvest-mascot').innerHTML = mascotSVG(100);

  const xpHtml = `
    <div class="harvest-xp-item">
      <div class="harvest-xp-num" style="color:var(--primary)">+${xp}</div>
      <div class="harvest-xp-label">XP</div>
    </div>
    <div class="harvest-xp-item">
      <div class="harvest-xp-num" style="color:var(--blue)">${correct}/3</div>
      <div class="harvest-xp-label">正确</div>
    </div>
  `;
  document.getElementById('harvest-xp').innerHTML = xpHtml;

  // Show updated branches from tree update
  let branchesHtml = '';
  if (treeUpdate && treeUpdate.updatedNodes) {
    branchesHtml = treeUpdate.updatedNodes.map(n =>
      `<div class="harvest-branch-tag" style="background:${n.color || 'var(--purple)'}">${n.icon || '✏️'} ${n.branchName || ''} · ${n.nodeName || ''}</div>`
    ).join('');
  } else {
    branchesHtml = `<div class="harvest-branch-tag" style="background:var(--purple)">✏️ 知识树已更新</div>`;
  }
  document.getElementById('harvest-branches').innerHTML = branchesHtml;

  const titles = ['收获满满！','知识树又长大了！','你的英语在成长！'];
  document.getElementById('harvest-title').textContent = titles[Math.floor(Math.random()*titles.length)];

  overlay.classList.add('show');
  fireConfetti();

  // Refresh tree stats
  loadTreeStats().then(() => {
    if (state.treeStats) {
      document.getElementById('tree-activated').textContent = state.treeStats.activatedNodes || 0;
      document.getElementById('tree-totalxp').textContent = state.treeStats.totalXp || 0;
    }
  });
}

function closeHarvest() {
  document.getElementById('harvest-overlay').classList.remove('show');
  document.getElementById('tabbar').classList.remove('hidden');
  navigate('feed');
  // Refresh video list
  loadVideoList();
}

function fireConfetti() {
  const container = document.getElementById('confetti-container');
  container.innerHTML = '';
  const colors = ['#58CC02','#1CB0F6','#CE82FF','#FF9600','#FFC800','#FF4B4B'];
  for (let i = 0; i < 30; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDelay = (Math.random() * 0.3) + 's';
    piece.style.animationDuration = (1 + Math.random() * 0.5) + 's';
    piece.style.transform = `rotate(${Math.random()*360}deg)`;
    container.appendChild(piece);
  }
  setTimeout(() => container.innerHTML = '', 2000);
}

// ====== KNOWLEDGE TREE (real API) ======
async function loadTreeData() {
  try {
    const data = await api('/api/tree');
    state.treeData = data;
    return data;
  } catch (e) {
    showToast('加载知识树失败: ' + e.message);
    return null;
  }
}

async function loadTreeStats() {
  try {
    const stats = await api('/api/tree/stats');
    state.treeStats = stats;
    return stats;
  } catch (e) {
    return null;
  }
}

async function renderTree() {
  // Load tree data if not cached
  if (!state.treeData) await loadTreeData();
  if (!state.treeStats) await loadTreeStats();

  // Update stats display
  if (state.treeStats) {
    document.getElementById('tree-activated').textContent = state.treeStats.activatedNodes || 0;
    document.getElementById('tree-totalxp').textContent = state.treeStats.totalXp || 0;
  }

  const container = document.getElementById('tree-hotspots');
  if (!state.treeData || !state.treeData.branches) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-lt)">加载失败</div>';
    return;
  }

  let html = '';
  for (const [branchId, branch] of Object.entries(state.treeData.branches)) {
    const pos = BRANCH_HOTSPOTS[branchId] || { x: 50, y: 50 };
    const visual = BRANCH_VISUAL[branchId] || { icon: '📦', colorDk: '#999' };
    const subBranches = branch.sub_branches || {};
    let totalLeaves = 0;
    let activated = 0;
    for (const nodes of Object.values(subBranches)) {
      totalLeaves += nodes.length;
      activated += nodes.filter(n => n.level > 0).length;
    }
    html += `
      <div class="tree-hotspot" style="left:${pos.x}%;top:${pos.y}%" onclick="showBranchDetail('${branchId}')">
        <div class="tree-hotspot-icon" style="background:${branch.color || '#999'}">${visual.icon}</div>
        <div class="tree-hotspot-label">${branch.name}</div>
        <div class="tree-hotspot-count">${activated}/${totalLeaves}</div>
      </div>
    `;
  }
  container.innerHTML = html;
}

function showBranchDetail(branchId) {
  navigate('branch');
  const branch = state.treeData?.branches?.[branchId];
  if (!branch) { showToast('分支数据不存在'); return; }

  const visual = BRANCH_VISUAL[branchId] || { icon: '📦', colorDk: '#999', en: '' };
  document.getElementById('branch-detail-title').textContent = branch.name;

  const subBranches = branch.sub_branches || {};
  let totalLeaves = 0;
  let activatedLeaves = 0;
  let totalXP = 0;
  for (const nodes of Object.values(subBranches)) {
    totalLeaves += nodes.length;
    activatedLeaves += nodes.filter(n => n.level > 0).length;
    totalXP += nodes.reduce((s, n) => s + (n.xp || 0), 0);
  }

  let html = `
    <div class="branch-header" style="background:linear-gradient(135deg,${branch.color || '#999'},${visual.colorDk})">
      <div class="bh-icon">${visual.icon}</div>
      <h2>${branch.name}</h2>
      <div class="bh-en">${visual.en}</div>
      <div class="branch-stats">
        <div class="branch-stat"><div class="branch-stat-num">${activatedLeaves}/${totalLeaves}</div><div class="branch-stat-label">已激活</div></div>
        <div class="branch-stat"><div class="branch-stat-num">${totalXP}</div><div class="branch-stat-label">总 XP</div></div>
        <div class="branch-stat"><div class="branch-stat-num">${Object.keys(subBranches).length}</div><div class="branch-stat-label">子分支</div></div>
      </div>
    </div>
  `;

  html += '<div class="node-list">';
  for (const [subName, nodes] of Object.entries(subBranches)) {
    html += `<div class="section-title" style="padding:0 0 4px">${subName}</div>`;
    for (const leaf of nodes) {
      const mastery = leaf.mastery || (leaf.level === 0 ? 0 : Math.min(100, Math.round((leaf.xp / 150) * 100)));
      const masteryColor = leaf.level === 0 ? '#E0E0E0' : leaf.level === 1 ? '#A8E6A1' : leaf.level === 2 ? '#58CC02' : '#FFD700';
      const lvlNames = ['休眠','发芽','茂叶','开花'];
      html += `
        <div class="node-card">
          <div class="node-card-top">
            <div class="node-name">${leaf.name}</div>
            <div class="node-level-badge lvl-${leaf.level}">${lvlNames[leaf.level] || '休眠'}</div>
          </div>
          ${leaf.definition ? `<div style="font-size:12px;color:var(--text-lt);margin-bottom:4px">${leaf.definition}</div>` : ''}
          <div class="node-mastery-bar"><div class="node-mastery-fill" style="width:${mastery}%;background:${masteryColor}"></div></div>
          <div class="node-xp-text">${leaf.xp || 0} XP · 掌握度 ${mastery}%</div>
        </div>
      `;
    }
  }
  html += '</div>';
  document.getElementById('branch-detail-content').innerHTML = html;
}

function treeZoom(factor) {
  state.treeZoom *= factor;
  state.treeZoom = Math.max(0.5, Math.min(2.5, state.treeZoom));
  const img = document.getElementById('tree-bg-img');
  const hotspots = document.getElementById('tree-hotspots');
  img.style.transform = `scale(${state.treeZoom})`;
  hotspots.style.transform = `scale(${state.treeZoom})`;
}

function resetTreeZoom() {
  state.treeZoom = 1;
  document.getElementById('tree-bg-img').style.transform = '';
  document.getElementById('tree-hotspots').style.transform = '';
}

// ====== PERSONAL PAGE ======
async function renderMe() {
  try {
    const stats = await api('/api/user/stats');
    state.userStats = stats;
    const user = getUser();

    // Update header
    document.querySelector('.me-name').textContent = user?.nickname || '同学';
    const totalXp = stats.totalXp || 0;
    const level = Math.floor(totalXp / 100) + 1;
    const levelNames = ['种子萌发','知识播种者','幼苗成长','枝繁叶茂','知识树达人'];
    document.querySelector('.me-level').textContent = `Lv.${level} ${levelNames[Math.min(level-1, levelNames.length-1)]}`;
    const xpInLevel = totalXp % 100;
    document.querySelector('.me-xp-fill').style.width = `${xpInLevel}%`;
    document.querySelector('.me-xp-text').textContent = `${xpInLevel} / 100 XP`;

    // Update stat cards
    const statCards = document.querySelectorAll('.stat-card');
    if (statCards.length >= 4) {
      statCards[0].querySelector('.stat-num').textContent = stats.videosParsed || 0;
      statCards[1].querySelector('.stat-num').textContent = stats.nodesActivated || 0;
      statCards[2].querySelector('.stat-num').textContent = stats.exercisesTotal || 0;
      statCards[3].querySelector('.stat-num').textContent = totalXp;
    }

    // Weekly chart (mock - API doesn't provide daily breakdown yet)
    const weekData = [0, 0, 0, 0, 0, 0, 0];
    // Try to show some data based on stats
    if (stats.videosParsed > 0) {
      const avg = Math.round(stats.totalXp / 7);
      for (let i = 0; i < 7; i++) weekData[i] = avg > 0 ? Math.round(avg * (0.5 + Math.random())) : 0;
      weekData[Math.floor(Math.random()*7)] = Math.max(weekData[Math.floor(Math.random()*7)], 10);
    }
    const maxVal = Math.max(...weekData, 1);
    const days = ['一','二','三','四','五','六','日'];
    const bars = weekData.map((v, i) => `
      <div class="chart-bar-col">
        <div class="chart-bar ${v === 0 ? 'rest' : ''}" style="height:${v === 0 ? 4 : Math.max(4, (v / maxVal * 80))}px"></div>
        <div class="chart-day">${days[i]}</div>
      </div>
    `).join('');
    document.getElementById('weekly-bars').innerHTML = bars;

    // Achievements
    const achievements = [
      { name:'初次发芽', unlocked: stats.nodesActivated >= 1, pos:'0 0' },
      { name:'5日连击', unlocked: false, pos:'50% 0' },
      { name:'解析10条视频', unlocked: stats.videosParsed >= 10, pos:'100% 0' },
      { name:'知识树初成', unlocked: stats.nodesActivated >= 10, pos:'0 100%' },
      { name:'学霸认证', unlocked: stats.accuracyRate && parseInt(stats.accuracyRate) >= 80, pos:'50% 100%' },
      { name:'50个知识点', unlocked: stats.nodesActivated >= 50, pos:'100% 100%' },
    ];
    const achHtml = achievements.map(a => `
      <div class="ach-item ${a.unlocked ? '' : 'locked'}">
        <div class="badge-sprite" style="background-position:${a.pos};background-image:url('assets/achievement-badges.png');${a.unlocked ? '' : 'filter:grayscale(1) opacity(0.4)'}"></div>
        <div class="ach-name">${a.name}</div>
      </div>
    `).join('');
    document.getElementById('ach-grid').innerHTML = achHtml;
  } catch (e) {
    showToast('加载用户数据失败: ' + e.message);
  }
}

// ====== TOAST ======
let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ====== BOOT ======
if (checkAuth()) {
  initApp();
}
</script>
